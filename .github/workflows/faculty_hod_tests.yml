name: Faculty/HOD Playwright Tests

on:
  push:
    paths:
      - 'pages/faculty_hod/**'
      - 'tests/faculty_hod/**'

  pull_request:
    paths:
      - 'pages/faculty_hod/**'
      - 'tests/faculty_hod/**'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      FACULTY_EMAIL: ${{ secrets.FACULTY_EMAIL }}
      FACULTY_PASSWORD: ${{ secrets.FACULTY_PASSWORD }}
      HEADLESS: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers + system deps
        run: playwright install chromium --with-deps

      - name: Run Faculty/HOD tests
        continue-on-error: true
        run: pytest tests/faculty_hod/

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: faculty-screenshots
          path: screenshots/
          if-no-files-found: ignore