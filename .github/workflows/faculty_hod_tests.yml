name: Faculty/HOD Playwright Tests

on:
  push:
    paths:
      - 'pages/faculty_hod/**'
      - 'tests/faculty_hod/**'

  pull_request:
    paths:
      - 'pages/faculty_hod/**'
      - 'tests/faculty_hod/**'

jobs:
  faculty-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Faculty/HOD tests
        continue-on-error: true
        run: |
          pytest tests/faculty_hod/
