name: Faculty/HOD Playwright Tests 
 
 on: 
   push: 
     paths: 
       - 'pages/faculty_hod/**' 
       - 'tests/faculty_hod/**' 
 
   pull_request: 
     paths: 
       - 'pages/faculty_hod/**' 
       - 'tests/faculty_hod/**'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      BASE_URL:         ${{ secrets.BASE_URL }}
      FACULTY_EMAIL:    ${{ secrets.FACULTY_EMAIL }}
      FACULTY_PASSWORD: ${{ secrets.FACULTY_PASSWORD }}
      HEADLESS:         "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers + system deps
        run: playwright install chromium --with-deps

      - name: Run Faculty/HOD tests
        id: faculty-tests
        run: |
          # Use a shell conditional to handle exit code 5 (no tests collected) gracefully
          # Pytest exit codes: 0 (success), 1 (failed), 2 (interrupted), 5 (no tests)
          pytest tests/faculty_hod/ -p no:cacheprovider --alluredir=reports/allure-results
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 5 ]; then
            echo "::notice title=No Tests Collected::The faculty test suite is currently empty. Skipping test execution."
            exit 0
          elif [ $EXIT_CODE -ne 0 ]; then
            echo "::error title=Tests Failed::Pytest exited with code $EXIT_CODE"
            exit $EXIT_CODE
          fi
        shell: bash

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: faculty-allure-results
          path: reports/allure-results/

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: faculty-screenshots
          path: screenshots/
          if-no-files-found: ignore
