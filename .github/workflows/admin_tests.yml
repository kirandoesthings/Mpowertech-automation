name: Admin Playwright Tests 
 
on: 
  push: 
    branches: [main, dev, admin] 
    paths: 
      - 'pages/admin/**' 
      - 'tests/admin/**' 
  pull_request: 
    branches: [main, dev] 
    paths: 
      - 'pages/admin/**' 
      - 'tests/admin/**' 
 
jobs: 
  test: 
    runs-on: ubuntu-latest 
 
    steps: 
      - name: Checkout code 
        uses: actions/checkout@v3 
 
      - name: Set up Python 
        uses: actions/setup-python@v4 
        with: 
          python-version: "3.11" 
 
      - name: Install dependencies 
        run: | 
          pip install -r requirements.txt 
          playwright install chromium 
 
      - name: Run Admin tests 
        env: 
          MUDU_USERNAME: ${{ secrets.MUDU_USERNAME }} 
          MUDU_PASSWORD: ${{ secrets.MUDU_PASSWORD }} 
        run: pytest tests/admin/ -v -s --tb=short 
 
      - name: Upload test report 
        if: always() 
        uses: actions/upload-artifact@v3 
        with: 
          name: admin-test-results 
          path: reports/ 
